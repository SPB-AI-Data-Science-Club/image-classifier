<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image Classifier - SPB AI Club</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>

  <header class="site-header">
    <div class="header-logo">
      <div class="logo-mark">IC</div>
      <div>
        <div class="header-title">Image Classifier</div>
        <div class="header-sub">SPB AI &amp; Data Science Club</div>
      </div>
    </div>
    <a href="https://github.com/SPB-AI-Data-Science-Club/image-classifier" target="_blank" class="header-link">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0 1 12 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/>
      </svg>
      GitHub
    </a>
  </header>

  <div class="main">

    <!-- Left: upload + preview -->
    <div>
      <!-- Upload zone (shown when no image) -->
      <div class="upload-zone" id="uploadZone"
           ondragover="event.preventDefault(); this.classList.add('drag')"
           ondragleave="this.classList.remove('drag')"
           ondrop="handleDrop(event)">
        <input type="file" accept="image/*" onchange="handleFile(this.files[0])" />
        <div class="upload-icon">
          <svg width="44" height="44" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
        </div>
        <div class="upload-title">Drop an image or click to browse</div>
        <div class="upload-hint">JPG, PNG, WEBP, GIF - any size</div>
      </div>

      <!-- Preview (shown after image selected) -->
      <div class="preview-wrap" id="previewWrap">
        <img id="previewImg" class="preview-img" src="" alt="Preview" />
        <button class="classify-btn" id="classifyBtn" onclick="classify()">Classify</button>
        <button class="reset-btn" onclick="reset()">Upload a different image</button>
      </div>
    </div>

    <!-- Right: results -->
    <div class="results-panel">
      <div class="results-label">Predictions</div>
      <div class="results-empty" id="resultsEmpty">
        Upload an image and click Classify to see top-5 predictions from the ResNet-50 model.
      </div>
      <div id="predList"></div>
    </div>

  </div>

  <script>
    let currentFile = null;

    function handleDrop(e) {
      e.preventDefault();
      document.getElementById('uploadZone').classList.remove('drag');
      const file = e.dataTransfer.files[0];
      if (file && file.type.startsWith('image/')) handleFile(file);
    }

    function handleFile(file) {
      if (!file) return;
      currentFile = file;
      const reader = new FileReader();
      reader.onload = e => {
        document.getElementById('previewImg').src = e.target.result;
        document.getElementById('uploadZone').style.display  = 'none';
        document.getElementById('previewWrap').classList.add('visible');
        document.getElementById('predList').innerHTML = '';
        document.getElementById('resultsEmpty').style.display = 'block';
      };
      reader.readAsDataURL(file);
    }

    function reset() {
      currentFile = null;
      document.getElementById('previewImg').src = '';
      document.getElementById('uploadZone').style.display   = '';
      document.getElementById('previewWrap').classList.remove('visible');
      document.getElementById('predList').innerHTML = '';
      document.getElementById('resultsEmpty').style.display = 'block';
    }

    async function classify() {
      if (!currentFile) return;
      const btn = document.getElementById('classifyBtn');
      btn.disabled = true;
      btn.textContent = 'Classifying...';

      const form = new FormData();
      form.append('image', currentFile);

      try {
        const res  = await fetch('/api/classify', { method: 'POST', body: form });
        if (!res.ok) { const t = await res.text(); throw new Error(t); }
        const data = await res.json();

        document.getElementById('resultsEmpty').style.display = 'none';
        document.getElementById('predList').innerHTML = data.predictions
          .map((p, i) => `
            <div class="prediction">
              <div class="pred-meta">
                <span class="pred-name">${p.label.replace(/_/g, ' ')}</span>
                <span class="pred-pct">${p.confidence}%</span>
              </div>
              <div class="pred-track">
                <div class="pred-fill" style="width:${Math.min(p.confidence, 100)}%"></div>
              </div>
            </div>`)
          .join('');

      } catch (err) {
        alert('Classification failed: ' + err.message);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Classify';
      }
    }
  </script>
</body>
</html>
